<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Three.js Blue Earth</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
        }

        canvas {
            display: block;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>

    <script>
        // 1. シーンの作成
        const scene = new THREE.Scene();

        // 2. カメラの作成
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 3;

        // 3. レンダラーの作成
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 4. 光（ライト）の追加
        const ambientLight = new THREE.AmbientLight(0x333333);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffffff, 1.5);
        sunLight.position.set(5, 3, 5);
        scene.add(sunLight);

        // 5. 地球（シンプルな青い球体）の作成
        const geometry = new THREE.SphereGeometry(1, 32, 32);

        // 【修正ポイント】エラーの原因だった画像の読み込みを一切やめ、シンプルな青い色に固定します
        const material = new THREE.MeshStandardMaterial({
            color: 0x0077ff, // 綺麗な青
            roughness: 0.6
        });

        const earth = new THREE.Mesh(geometry, material);
        scene.add(earth);

        // 6. アニメーションループ
        function animate() {
            requestAnimationFrame(animate);

            // 地球を自転させる
            earth.rotation.y += 0.002;

            renderer.render(scene, camera);
        }

        animate();

        // --- NASA APIから小惑星データを取得する関数 ---
        async function fetchAsteroids() {
            // テスト用のDEMO_KEYを使い、今日（2026-05-16）のデータをリクエストします
            const apiKey = 'DEMO_KEY';
            const url = `https://api.nasa.gov/neo/rest/v1/feed?start_date=2026-05-16&end_date=2026-05-16&api_key=${apiKey}`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                // 1. F12のコンソールに、NASAから届いた生の宇宙データを表示させる
                console.log("NASAから届いた、本物の宇宙データ:", data);

                // 2. 今日（2026-05-16）接近する小惑星のリスト（配列）を取り出す
                const asteroids = data.near_earth_objects['2026-05-16'];

                // 3. 小惑星の数だけループ処理をして、地球の周りに3Dとして登場させる
                asteroids.forEach((asteroid, index) => {
                    createAsteroid3D(asteroid, index);
                });

            } catch (error) {
                console.error("NASAのデータ取得に失敗しました:", error);
            }
        }

        // --- 届いたデータを使って、3D空間に小惑星（岩石）を生成する関数 ---
        function createAsteroid3D(asteroid, index) {
            // ① 小惑星の「実際の大きさ（直径km）」をデータから取得して、3Dのサイズに変換
            const diameter = asteroid.estimated_diameter.kilometers.estimated_diameter_max;
            const size = diameter * 0.4; // 画面で見やすい大きさに調整

            // ② 形と素材を作る（ゴツゴツした岩石感を出すために、あえて球体の分割数を減らしてグレーにします）
            const asteroidGeometry = new THREE.SphereGeometry(size, 6, 6);
            const asteroidMaterial = new THREE.MeshStandardMaterial({
                color: 0x888888, // 宇宙の岩石のグレー
                roughness: 0.9   // ツヤなし
            });
            const asteroidMesh = new THREE.Mesh(asteroidGeometry, asteroidMaterial);

            // ③ 地球の周りの配置（円周上に綺麗に分散させます）
            const angle = (index / 10) * Math.PI * 2;
            const distance = 2.0 + Math.random() * 2.0; // 地球から少し離れた軌道に配置

            asteroidMesh.position.x = Math.cos(angle) * distance;
            asteroidMesh.position.z = Math.sin(angle) * distance;
            asteroidMesh.position.y = (Math.random() - 0.5) * 1.5; // 上下のばらつき

            // ④ あなたが作った宇宙空間（シーン）に、本物の小惑星を配置！
            scene.add(asteroidMesh);
        }

        // 4. 最後に、このデータ取得処理のスイッチをオンにする
        fetchAsteroids();

        // レスポンス対応
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
