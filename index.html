<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Earth Defense Simulator</title>

    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>

<body>
    <!-- Corner Decorations -->
    <div class="corner corner-tl"></div>
    <div class="corner corner-br"></div>

    <!-- Title Bar -->
    <div id="titleBar">
        <h1>EARTH <span>DEFENSE</span></h1>
        <div class="subtitle">Near-Earth Object Monitor</div>
    </div>

    <!-- Info Panel -->
    <div id="infoPanel">
        <h2>小惑星情報</h2>
        <p>地球の周りの小惑星をクリックしてください。</p>
    </div>

    <!-- Control Panel (below Info Panel) -->
    <div id="controlPanel">
        <div class="toggle-item">
            <span class="toggle-label">軌道表示</span>
            <label class="toggle-switch">
                <input type="checkbox" id="toggleOrbit" checked>
                <span class="toggle-slider"></span>
            </label>
        </div>
        <div class="toggle-item">
            <span class="toggle-label">星表示</span>
            <label class="toggle-switch">
                <input type="checkbox" id="toggleStars" checked>
                <span class="toggle-slider"></span>
            </label>
        </div>
        <div class="toggle-item">
            <span class="toggle-label">人工衛星</span>
            <label class="toggle-switch">
                <input type="checkbox" id="toggleSatellites" checked>
                <span class="toggle-slider"></span>
            </label>
        </div>
        <button id="loadSatellites" class="reset-btn">衛星データ取得</button>
        <button id="resetCamera" class="reset-btn">カメラリセット</button>
    </div>

    <!-- Date Control Panel -->
    <div id="dateControlPanel">
        <div class="date-display">
            <span class="date-label">観測日</span>
            <span class="date-value" id="displayDate">--</span>
        </div>
        <div class="date-buttons">
            <button id="prevDay" class="date-btn">前日</button>
            <button id="nextDay" class="date-btn">翌日</button>
            <button id="plus7Days" class="date-btn">+7日</button>
            <button id="plus30Days" class="date-btn">+30日</button>
            <button id="toToday" class="date-btn accent">今日に戻る</button>
        </div>
        <div class="slider-container">
            <span class="slider-label">タイムスライダー</span>
            <div class="slider-wrapper">
                <input type="range" id="timeSlider" min="0" max="30" value="0">
                <span class="slider-value" id="sliderValue">今日</span>
            </div>
        </div>
    </div>

    <!-- Stats Bar -->
    <div id="statsBar">
        <div class="stat-item">
            <div class="stat-value" id="totalCount">--</div>
            <div class="stat-label">検出数</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="hazardCount">--</div>
            <div class="stat-label">危険候補</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="currentDate">--</div>
            <div class="stat-label">観測日</div>
        </div>
    </div>

    <script>
        // =========================
        // シーン
        // =========================
        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(
            60,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );
        camera.position.z = 3.2;

        const renderer = new THREE.WebGLRenderer({
            antialias: true
        });

        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.outputEncoding = THREE.sRGBEncoding;

        document.body.appendChild(renderer.domElement);

        // =========================
        // カメラコントロール
        // =========================
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 1.5;
        controls.maxDistance = 10;

        // デフォルトカメラ位置を保存
        const defaultCameraPosition = camera.position.clone();
        const defaultControlsTarget = controls.target.clone();

        // カメラリセット関数
        function resetCamera() {
            // スムーズにリセット
            const duration = 500; // ms
            const startPosition = camera.position.clone();
            const startTarget = controls.target.clone();
            const startTime = performance.now();

            function animateReset() {
                const elapsed = performance.now() - startTime;
                const t = Math.min(elapsed / duration, 1);
                // イージング (ease-out)
                const eased = 1 - Math.pow(1 - t, 3);

                camera.position.lerpVectors(startPosition, defaultCameraPosition, eased);
                controls.target.lerpVectors(startTarget, defaultControlsTarget, eased);
                controls.update();

                if (t < 1) {
                    requestAnimationFrame(animateReset);
                }
            }

            animateReset();
        }

        // リセットボタンイベント
        document.getElementById('resetCamera').addEventListener('click', resetCamera);

        // =========================
        // テクスチャ
        // =========================
        const loader = new THREE.TextureLoader();

        const earthTexture = loader.load('./textures/earth_daymap.jpg');
        const nightTexture = loader.load('./textures/earth_night.jpg');
        const starTexture = loader.load('./textures/stars.jpg');

        scene.background = starTexture;

        // =========================
        // ライト
        // =========================
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.15);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffffff, 2.5);
        sunLight.position.set(8, 4, 6);
        scene.add(sunLight);

        // =========================
        // 地球
        // =========================
        const earthGeometry = new THREE.SphereGeometry(1, 128, 128);

        const earthMaterial = new THREE.MeshStandardMaterial({
            map: earthTexture,
            emissiveMap: nightTexture,
            emissive: new THREE.Color(0xffffff),
            emissiveIntensity: 0.45,
            roughness: 1.0,
            metalness: 0.0
        });

        const earth = new THREE.Mesh(earthGeometry, earthMaterial);
        scene.add(earth);

        // =========================
        // 大気
        // =========================
        const atmosphereGeometry = new THREE.SphereGeometry(1.08, 128, 128);

        const atmosphereMaterial = new THREE.MeshBasicMaterial({
            color: 0x4da6ff,
            transparent: true,
            opacity: 0.16,
            side: THREE.BackSide
        });

        const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
        scene.add(atmosphere);

        // =========================
        // 小惑星管理
        // =========================
        const asteroidGroup = new THREE.Group();
        scene.add(asteroidGroup);

        // クリック判定用
        const asteroidMeshes = [];

        // 軌道ライン管理用
        const orbitLines = [];
        let orbitVisible = true;

        // =========================
        // 人工衛星管理
        // =========================
        const satelliteGroup = new THREE.Group();
        scene.add(satelliteGroup);

        // クリック判定用
        const satelliteMeshes = [];

        // 衛星軌道ライン管理用
        const satelliteOrbitLines = [];
        let satellitesVisible = true;
        let satellitesLoaded = false;

        // N2YO API Key (無料登録: https://www.n2yo.com/api/)
        const N2YO_API_KEY = 'DEMO_KEY'; // ご自身のAPIキーに置き換えてください

        // 衛星カテゴリID
        const SATELLITE_CATEGORIES = {
            ISS: 25544,           // ISS NORAD ID
            STARLINK: 52,         // Starlink category
            GPS: 20,              // GPS Operational
            WEATHER: 4,           // Weather satellites
            AMATEUR: 18           // Amateur radio
        };

        // Raycaster
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // =========================
        // 日付管理
        // =========================
        let currentDate = formatDate(new Date());
        const today = formatDate(new Date());

        function formatDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function addDays(dateString, days) {
            const date = new Date(dateString);
            date.setDate(date.getDate() + days);
            return formatDate(date);
        }

        function updateDateDisplay() {
            document.getElementById('displayDate').textContent = currentDate;
        }

        // =========================
        // 小惑星・軌道線クリア
        // =========================
        function clearAsteroids() {
            // asteroidGroupの中身を削除
            while (asteroidGroup.children.length > 0) {
                const child = asteroidGroup.children[0];
                asteroidGroup.remove(child);
                if (child.geometry) child.geometry.dispose();
                if (child.material) child.material.dispose();
            }

            // 軌道線を削除
            orbitLines.forEach(line => {
                scene.remove(line);
                if (line.geometry) line.geometry.dispose();
                if (line.material) line.material.dispose();
            });
            orbitLines.length = 0;

            // クリック判定用配列をクリア
            asteroidMeshes.length = 0;
        }

        function resetInfoPanel() {
            const panel = document.getElementById('infoPanel');
            panel.innerHTML = `
                <h2>小惑星情報</h2>
                <p>地球の周りの小惑星をクリックしてください。</p>
            `;
        }

        function showLoadingPanel() {
            const panel = document.getElementById('infoPanel');
            panel.innerHTML = `
                <h2>小惑星情報</h2>
                <p>データ取得中...</p>
            `;
        }

        function showNoDataPanel() {
            const panel = document.getElementById('infoPanel');
            panel.innerHTML = `
                <h2>小惑星情報</h2>
                <p>この日付の小惑星データはありません</p>
            `;
        }

        function showErrorPanel() {
            const panel = document.getElementById('infoPanel');
            panel.innerHTML = `
                <h2>小惑星情報</h2>
                <p>NASA APIの取得に失敗しました</p>
            `;
        }

        // =========================
        // NASA API
        // =========================
        async function fetchAsteroids(date) {
            const apiKey = 'DEMO_KEY';

            // 既存データをクリア
            clearAsteroids();
            showLoadingPanel();
            updateDateDisplay();

            const url = `https://api.nasa.gov/neo/rest/v1/feed?start_date=${date}&end_date=${date}&api_key=${apiKey}`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                console.log('NASAから届いたデータ:', data);

                const asteroids = data.near_earth_objects[date];

                if (!asteroids || asteroids.length === 0) {
                    console.warn('この日付の小惑星データがありません');
                    showNoDataPanel();
                    updateStatsBar([], date);
                    return;
                }

                asteroids.forEach((asteroid, index) => {
                    createAsteroid3D(asteroid, index, asteroids.length);
                });

                // Update stats bar
                updateStatsBar(asteroids, date);
                resetInfoPanel();

            } catch (error) {
                console.error('NASAのデータ取得に失敗しました:', error);
                showErrorPanel();
            }
        }

        // =========================
        // 小惑星生成
        // =========================
        function createAsteroid3D(asteroid, index, total) {
            const diameter =
                asteroid.estimated_diameter.kilometers.estimated_diameter_max;

            const size = Math.max(0.025, Math.log(diameter + 1) * 0.05);

            const geometry = new THREE.SphereGeometry(size, 8, 8);

            const isHazardous = asteroid.is_potentially_hazardous_asteroid;

            const material = new THREE.MeshStandardMaterial({
                color: isHazardous ? 0xff3333 : 0x888888,
                roughness: 0.95,
                metalness: 0.05,
                emissive: isHazardous ? new THREE.Color(0x330000) : new THREE.Color(0x000000),
                emissiveIntensity: isHazardous ? 0.8 : 0
            });

            const mesh = new THREE.Mesh(geometry, material);

            const angle = (index / total) * Math.PI * 2;
            const distance = 2.0 + Math.random() * 1.3;

            mesh.position.x = Math.cos(angle) * distance;
            mesh.position.z = Math.sin(angle) * distance;
            mesh.position.y = (Math.random() - 0.5) * 1.2;

            const orbitLine = createOrbitLine(distance, mesh.position.y, isHazardous);
            scene.add(orbitLine);
            orbitLines.push(orbitLine);

            mesh.rotation.x = Math.random() * Math.PI;
            mesh.rotation.y = Math.random() * Math.PI;

            mesh.userData.rotationSpeed = {
                x: 0.005 + Math.random() * 0.01,
                y: 0.005 + Math.random() * 0.01
            };

            // ① 小惑星にNASAデータを保存
            mesh.userData.asteroid = asteroid;

            asteroidGroup.add(mesh);

            // ② クリック判定用配列に追加
            asteroidMeshes.push(mesh);
        }

        function createOrbitLine(radius, yPosition, isHazardous) {
            const points = [];
            const segments = 128;

            for (let i = 0; i <= segments; i++) {
                const angle = (i / segments) * Math.PI * 2;

                points.push(
                    new THREE.Vector3(
                        Math.cos(angle) * radius,
                        yPosition,
                        Math.sin(angle) * radius
                    )
                );
            }

            const geometry = new THREE.BufferGeometry().setFromPoints(points);

            const material = new THREE.LineBasicMaterial({
                color: isHazardous ? 0xff3333 : 0x66ccff,
                transparent: true,
                opacity: isHazardous ? 0.6 : 0.25
            });

            const orbitLine = new THREE.Line(geometry, material);

            return orbitLine;
        }

        // =========================
        // 軌道ライン表示切替
        // =========================
        function toggleOrbitLines() {
            const checkbox = document.getElementById('toggleOrbit');
            orbitVisible = checkbox.checked;
            orbitLines.forEach(line => {
                line.visible = orbitVisible;
            });
        }

        document.getElementById('toggleOrbit').addEventListener('change', toggleOrbitLines);

        // =========================
        // 星表示切替
        // =========================
        function toggleStarsBackground() {
            const checkbox = document.getElementById('toggleStars');
            if (checkbox.checked) {
                scene.background = starTexture;
            } else {
                scene.background = new THREE.Color(0x000000);
            }
        }

        document.getElementById('toggleStars').addEventListener('change', toggleStarsBackground);

        // =========================
        // ③ クリック判定
        // =========================
        window.addEventListener('click', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            // 小惑星の判定
            const asteroidHits = raycaster.intersectObjects(asteroidMeshes);
            if (asteroidHits.length > 0) {
                const asteroid = asteroidHits[0].object.userData.asteroid;
                showAsteroidInfo(asteroid);
                return;
            }

            // 衛星の判定
            const satelliteHits = raycaster.intersectObjects(satelliteMeshes);
            if (satelliteHits.length > 0) {
                const satellite = satelliteHits[0].object.userData.satellite;
                const type = satelliteHits[0].object.userData.satelliteType;
                showSatelliteInfo(satellite, type);
            }
        });

        // =========================
        // ⑤ 情報表示関数
        // =========================
        function showAsteroidInfo(asteroid) {
            const panel = document.getElementById('infoPanel');

            const approach = asteroid.close_approach_data[0];

            const name = asteroid.name;
            const diameter =
                asteroid.estimated_diameter.kilometers.estimated_diameter_max;

            const distance = approach.miss_distance.kilometers;
            const velocity = approach.relative_velocity.kilometers_per_hour;
            const hazardous = asteroid.is_potentially_hazardous_asteroid;

            panel.innerHTML = `
        <h2>${name}</h2>
        <p><strong>推定直径:</strong> ${Number(diameter).toFixed(2)} km</p>
        <p><strong>接近距離:</strong> ${Number(distance).toLocaleString()} km</p>
        <p><strong>速度:</strong> ${Number(velocity).toLocaleString()} km/h</p>
        <p>
          <strong>危険判定:</strong>
          <span class="${hazardous ? 'danger' : 'safe'}">
            ${hazardous ? '危険候補' : '通常'}
          </span>
        </p>
      `;
        }

        // =========================
        // ⑥ Stats Bar更新
        // =========================
        function updateStatsBar(asteroids, date) {
            const total = asteroids.length;
            const hazardous = asteroids.filter(a => a.is_potentially_hazardous_asteroid).length;

            document.getElementById('totalCount').textContent = total;
            document.getElementById('hazardCount').textContent = hazardous;
            document.getElementById('currentDate').textContent = date;
        }

        // =========================
        // 人工衛星機能
        // =========================

        // 衛星データをクリア
        function clearSatellites() {
            while (satelliteGroup.children.length > 0) {
                const child = satelliteGroup.children[0];
                satelliteGroup.remove(child);
                if (child.geometry) child.geometry.dispose();
                if (child.material) child.material.dispose();
            }

            satelliteOrbitLines.forEach(line => {
                scene.remove(line);
                if (line.geometry) line.geometry.dispose();
                if (line.material) line.material.dispose();
            });
            satelliteOrbitLines.length = 0;
            satelliteMeshes.length = 0;
        }

        // N2YO APIから衛星データを取得
        async function fetchSatellites() {
            if (N2YO_API_KEY === 'DEMO_KEY') {
                console.warn('N2YO APIキーが設定されていません。サンプルデータを使用します。');
                createSampleSatellites();
                return;
            }

            clearSatellites();

            const panel = document.getElementById('infoPanel');
            panel.innerHTML = `<h2>衛星情報</h2><p>衛星データ取得中...</p>`;

            try {
                // 観測地点（東京）からの衛星を取得
                const lat = 35.6762;
                const lng = 139.6503;
                const alt = 0;
                const radius = 90; // 度
                const categoryId = SATELLITE_CATEGORIES.STARLINK;

                const url = `https://api.n2yo.com/rest/v1/satellite/above/${lat}/${lng}/${alt}/${radius}/${categoryId}/&apiKey=${N2YO_API_KEY}`;

                const response = await fetch(url);
                const data = await response.json();

                if (data.above && data.above.length > 0) {
                    // 最大200個まで表示
                    const satellites = data.above.slice(0, 200);
                    satellites.forEach((sat, index) => {
                        createSatellite3D(sat, index, satellites.length, 'starlink');
                    });

                    panel.innerHTML = `<h2>衛星情報</h2><p>${satellites.length}個の衛星を読み込みました。<br>クリックして詳細を表示</p>`;
                    satellitesLoaded = true;
                } else {
                    createSampleSatellites();
                }

            } catch (error) {
                console.error('衛星データ取得エラー:', error);
                createSampleSatellites();
            }
        }

        // サンプル衛星データを作成
        function createSampleSatellites() {
            clearSatellites();

            // サンプル衛星データ（実際の軌道をシミュレート）
            const sampleSatellites = [
                // ISS
                { satname: 'ISS (ZARYA)', satid: 25544, satalt: 420, satlat: 35, satlng: 140, type: 'iss' },
                // Starlink衛星群
                ...Array.from({ length: 100 }, (_, i) => ({
                    satname: `STARLINK-${1000 + i}`,
                    satid: 44000 + i,
                    satalt: 550,
                    satlat: (Math.random() - 0.5) * 100,
                    satlng: Math.random() * 360 - 180,
                    type: 'starlink'
                })),
                // GPS衛星
                ...Array.from({ length: 24 }, (_, i) => ({
                    satname: `GPS BIIR-${i + 1}`,
                    satid: 28000 + i,
                    satalt: 20200,
                    satlat: 55 * Math.sin(i * Math.PI / 12),
                    satlng: i * 30,
                    type: 'gps'
                })),
                // 気象衛星
                { satname: 'HIMAWARI-8', satid: 40267, satalt: 35786, satlat: 0, satlng: 140.7, type: 'weather' },
                { satname: 'HIMAWARI-9', satid: 41836, satalt: 35786, satlat: 0, satlng: 140.7, type: 'weather' },
                { satname: 'GOES-16', satid: 41866, satalt: 35786, satlat: 0, satlng: -75.2, type: 'weather' },
            ];

            sampleSatellites.forEach((sat, index) => {
                createSatellite3D(sat, index, sampleSatellites.length, sat.type);
            });

            const panel = document.getElementById('infoPanel');
            panel.innerHTML = `<h2>衛星情報</h2><p>${sampleSatellites.length}個のサンプル衛星を表示中<br>（N2YO APIキーを設定すると実データを取得）</p>`;
            satellitesLoaded = true;
        }

        // 衛星3Dオブジェクト生成
        function createSatellite3D(satellite, index, total, type) {
            // 高度に基づく距離（地球半径=1として計算）
            const earthRadiusKm = 6371;
            const altitudeKm = satellite.satalt || 550;
            const orbitRadius = 1 + (altitudeKm / earthRadiusKm) * 0.3; // スケール調整

            // 衛星のサイズ
            let size = 0.008;
            let color = 0x00ffff;
            let emissiveColor = 0x003333;

            switch (type) {
                case 'iss':
                    size = 0.025;
                    color = 0xffff00;
                    emissiveColor = 0x333300;
                    break;
                case 'starlink':
                    size = 0.006;
                    color = 0x00ffff;
                    emissiveColor = 0x003333;
                    break;
                case 'gps':
                    size = 0.012;
                    color = 0x00ff00;
                    emissiveColor = 0x003300;
                    break;
                case 'weather':
                    size = 0.018;
                    color = 0xff00ff;
                    emissiveColor = 0x330033;
                    break;
                default:
                    break;
            }

            const geometry = new THREE.SphereGeometry(size, 8, 8);
            const material = new THREE.MeshStandardMaterial({
                color: color,
                roughness: 0.3,
                metalness: 0.8,
                emissive: new THREE.Color(emissiveColor),
                emissiveIntensity: 1.0
            });

            const mesh = new THREE.Mesh(geometry, material);

            // 緯度経度から位置を計算
            const lat = (satellite.satlat || 0) * Math.PI / 180;
            const lng = (satellite.satlng || 0) * Math.PI / 180;

            mesh.position.x = orbitRadius * Math.cos(lat) * Math.cos(lng);
            mesh.position.y = orbitRadius * Math.sin(lat);
            mesh.position.z = orbitRadius * Math.cos(lat) * Math.sin(lng);

            // 軌道ライン作成（静止軌道以外）
            if (type !== 'weather') {
                const orbitLine = createSatelliteOrbitLine(orbitRadius, lat, type);
                scene.add(orbitLine);
                satelliteOrbitLines.push(orbitLine);
            }

            // 衛星の公転速度（軌道高度に反比例）
            mesh.userData.orbitSpeed = 0.001 / Math.sqrt(orbitRadius);
            mesh.userData.orbitRadius = orbitRadius;
            mesh.userData.orbitInclination = lat;
            mesh.userData.orbitPhase = lng;
            mesh.userData.satellite = satellite;
            mesh.userData.satelliteType = type;

            satelliteGroup.add(mesh);
            satelliteMeshes.push(mesh);
        }

        // 衛星軌道ライン作成
        function createSatelliteOrbitLine(radius, inclination, type) {
            const points = [];
            const segments = 64;

            for (let i = 0; i <= segments; i++) {
                const angle = (i / segments) * Math.PI * 2;

                // 傾斜軌道
                const x = radius * Math.cos(angle);
                const y = radius * Math.sin(angle) * Math.sin(inclination);
                const z = radius * Math.sin(angle) * Math.cos(inclination);

                points.push(new THREE.Vector3(x, y, z));
            }

            const geometry = new THREE.BufferGeometry().setFromPoints(points);

            let color = 0x00ffff;
            let opacity = 0.15;

            switch (type) {
                case 'iss':
                    color = 0xffff00;
                    opacity = 0.4;
                    break;
                case 'gps':
                    color = 0x00ff00;
                    opacity = 0.2;
                    break;
                case 'starlink':
                    color = 0x00ffff;
                    opacity = 0.08;
                    break;
            }

            const material = new THREE.LineBasicMaterial({
                color: color,
                transparent: true,
                opacity: opacity
            });

            return new THREE.Line(geometry, material);
        }

        // 衛星表示切替
        function toggleSatellites() {
            const checkbox = document.getElementById('toggleSatellites');
            satellitesVisible = checkbox.checked;
            satelliteGroup.visible = satellitesVisible;
            satelliteOrbitLines.forEach(line => {
                line.visible = satellitesVisible;
            });
        }

        document.getElementById('toggleSatellites').addEventListener('change', toggleSatellites);

        // 衛星データ取得ボタン
        document.getElementById('loadSatellites').addEventListener('click', fetchSatellites);

        // 衛星情報表示
        function showSatelliteInfo(satellite, type) {
            const panel = document.getElementById('infoPanel');

            let typeLabel = '人工衛星';
            switch (type) {
                case 'iss': typeLabel = '国際宇宙ステーション'; break;
                case 'starlink': typeLabel = 'Starlink通信衛星'; break;
                case 'gps': typeLabel = 'GPS航法衛星'; break;
                case 'weather': typeLabel = '気象衛星'; break;
            }

            panel.innerHTML = `
                <h2>${satellite.satname}</h2>
                <p><strong>種類:</strong> ${typeLabel}</p>
                <p><strong>NORAD ID:</strong> ${satellite.satid}</p>
                <p><strong>軌道高度:</strong> ${satellite.satalt?.toLocaleString() || '不明'} km</p>
                <p><strong>緯度:</strong> ${satellite.satlat?.toFixed(2) || '不明'}°</p>
                <p><strong>経度:</strong> ${satellite.satlng?.toFixed(2) || '不明'}°</p>
            `;
        }

        // =========================
        // 日付変更ハンドラー
        // =========================
        function changeDate(newDate) {
            currentDate = newDate;
            fetchAsteroids(currentDate);

            // スライダーの値も更新
            const daysDiff = Math.round((new Date(currentDate) - new Date(today)) / (1000 * 60 * 60 * 24));
            const slider = document.getElementById('timeSlider');
            if (daysDiff >= 0 && daysDiff <= 30) {
                slider.value = daysDiff;
                updateSliderLabel(daysDiff);
            }
        }

        function updateSliderLabel(days) {
            const label = document.getElementById('sliderValue');
            if (days === 0) {
                label.textContent = '今日';
            } else {
                label.textContent = `${days}日後`;
            }
        }

        // ボタンイベントリスナー
        document.getElementById('prevDay').addEventListener('click', () => {
            changeDate(addDays(currentDate, -1));
        });

        document.getElementById('nextDay').addEventListener('click', () => {
            changeDate(addDays(currentDate, 1));
        });

        document.getElementById('plus7Days').addEventListener('click', () => {
            changeDate(addDays(currentDate, 7));
        });

        document.getElementById('plus30Days').addEventListener('click', () => {
            changeDate(addDays(currentDate, 30));
        });

        document.getElementById('toToday').addEventListener('click', () => {
            changeDate(today);
        });

        // スライダーイベントリスナー
        document.getElementById('timeSlider').addEventListener('input', (e) => {
            const days = parseInt(e.target.value);
            updateSliderLabel(days);
        });

        document.getElementById('timeSlider').addEventListener('change', (e) => {
            const days = parseInt(e.target.value);
            const newDate = addDays(today, days);
            currentDate = newDate;
            fetchAsteroids(currentDate);
        });

        // 初期化
        fetchAsteroids(currentDate);

        // 初期衛星データを読み込み
        setTimeout(() => {
            createSampleSatellites();
        }, 1000);

        // =========================
        // アニメーション
        // =========================
        function animate() {
            requestAnimationFrame(animate);

            earth.rotation.y += 0.0018;
            atmosphere.rotation.y += 0.0018;

            asteroidGroup.rotation.y += 0.001;

            asteroidGroup.children.forEach((asteroid) => {
                asteroid.rotation.x += asteroid.userData.rotationSpeed.x;
                asteroid.rotation.y += asteroid.userData.rotationSpeed.y;
            });

            // 衛星のアニメーション（軌道周回）
            satelliteGroup.children.forEach((satellite) => {
                if (satellite.userData.orbitSpeed) {
                    satellite.userData.orbitPhase += satellite.userData.orbitSpeed;

                    const radius = satellite.userData.orbitRadius;
                    const inclination = satellite.userData.orbitInclination;
                    const phase = satellite.userData.orbitPhase;

                    satellite.position.x = radius * Math.cos(phase);
                    satellite.position.y = radius * Math.sin(inclination) * Math.sin(phase);
                    satellite.position.z = radius * Math.cos(inclination) * Math.sin(phase);
                }
            });

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        // =========================
        // リサイズ対応
        // =========================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();

            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
